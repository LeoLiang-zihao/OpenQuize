<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Anki Quiz</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- KaTeX for LaTeX rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
    <!-- marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@14.0.0/marked.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header>
            <h1 id="header-title" onclick="showHome()">Open Anki Quiz</h1>
        </header>

        <!-- Home: Upload + Set list -->
        <div id="home-view">
            <section class="upload-section">
                <h2>Import Questions</h2>
                <form id="upload-form">
                    <div class="form-group">
                        <label for="set-type">Question Type</label>
                        <select id="set-type">
                            <option value="mcq">Multiple Choice (MCQ)</option>
                            <option value="open">Open / Math Problems</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="pdf-file">File (PDF or DOCX)</label>
                        <input type="file" id="pdf-file" accept=".pdf,.docx" multiple required>
                    </div>
                    <div class="form-group">
                        <label for="set-name">Set Name (optional)</label>
                        <input type="text" id="set-name" placeholder="e.g. Biostat 706 Exam 1">
                    </div>
                    <div class="form-group">
                        <label for="prompt">Prompt / Instructions (optional)</label>
                        <textarea id="prompt" rows="3" placeholder="e.g. Extract all questions and generate explanations..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="references">Reference file paths (comma-separated, optional)</label>
                        <textarea id="references" rows="2" placeholder="e.g. /path/to/Lecture 01.pdf, /path/to/Lecture 02.pdf"></textarea>
                    </div>
                    <button type="submit" id="upload-btn">Upload & Extract</button>
                </form>
                <div id="upload-status" class="hidden"></div>
            </section>

            <section class="sets-section">
                <h2>Question Sets</h2>
                <div id="sets-list"></div>
            </section>
        </div>

        <!-- Quiz view: 3-column layout -->
        <!-- Sidebar toggle buttons (always visible, fixed position) -->
        <button class="sidebar-toggle sidebar-toggle-left hidden" id="toggle-cat-btn" onclick="toggleCategorySidebar()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <button class="sidebar-toggle sidebar-toggle-right hidden" id="toggle-chat-btn" onclick="toggleChatSidebar()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </button>

        <div id="quiz-view" class="hidden left-collapsed right-collapsed">
            <!-- Left: Category Sidebar -->
            <aside id="category-sidebar" class="sidebar sidebar-left">
                <div class="sidebar-content">
                    <h3>Categories</h3>
                    <ul id="category-list"></ul>
                </div>
            </aside>

            <!-- Center: Quiz Main -->
            <main id="quiz-main">
                <div class="quiz-header">
                    <button class="back-btn" onclick="showHome()">&larr; Back</button>
                    <div class="progress-bar">
                        <div id="progress-fill"></div>
                    </div>
                    <span id="progress-text">0/0</span>
                    <button class="append-btn" onclick="openAppendModal()" title="Add more questions">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    </button>
                </div>

                <div id="quiz-card">
                    <div id="question-category" class="category-tag"></div>
                    <div id="question-number" class="question-num"></div>
                    <div id="question-text" class="question-text markdown-content"></div>

                    <!-- MCQ options (hidden for open questions) -->
                    <div id="options-list" class="options-list"></div>

                    <!-- "I don't know" button (shown before answering for MCQ) -->
                    <div id="idk-area" class="hidden">
                        <button id="idk-btn" class="idk-btn" onclick="revealMCQAnswer()">I don't know</button>
                    </div>

                    <!-- Open question area -->
                    <div id="open-question-area" class="hidden">
                        <div id="open-answer-area" class="hidden">
                            <h4>Answer Key</h4>
                            <div id="open-answer-content" class="markdown-content"></div>
                        </div>

                        <!-- Guided dialogue -->
                        <div id="guided-dialogue" class="guided-dialogue">
                            <div class="guided-header">
                                <span>Guided Discussion</span>
                                <button class="clear-chat-btn" onclick="clearGuidedChat()" title="Clear dialogue history">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                                </button>
                            </div>
                            <div id="guided-messages" class="guided-messages"></div>
                            <div class="guided-input-area">
                                <div class="guided-input-wrapper">
                                    <textarea id="guided-input" placeholder="Type your understanding of the problem..." rows="2"></textarea>
                                    <button id="voice-btn" class="voice-btn" onclick="toggleVoiceRecording()" title="Voice input">
                                        <svg id="mic-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                                        <svg id="mic-recording-icon" class="hidden" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                                    </button>
                                </div>
                                <button id="guided-send-btn" onclick="sendGuidedMessage()">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                                </button>
                            </div>
                        </div>

                        <div class="open-action-buttons">
                            <button id="reveal-btn" class="reveal-btn" onclick="revealOpenAnswer()">Show Answer</button>
                            <button id="open-master-btn" class="master-btn" onclick="markMastered()">Mastered</button>
                            <button id="open-next-btn" class="next-btn" onclick="nextQuestion()">Next</button>
                        </div>
                    </div>

                    <!-- MCQ result area (shown after answering) -->
                    <div id="result-area" class="hidden">
                        <div id="result-banner"></div>
                        <div id="explanation-area" class="markdown-content"></div>
                        <div class="action-buttons">
                            <button id="master-btn" class="master-btn hidden" onclick="markMastered()">Mastered</button>
                            <button id="next-btn" class="next-btn" onclick="nextQuestion()">Next</button>
                        </div>
                    </div>
                </div>

                <!-- All done -->
                <div id="done-card" class="hidden">
                    <h2>All Done!</h2>
                    <p>You've mastered all questions in this set.</p>
                    <button onclick="resetAndRestart()">Restart Set</button>
                    <button onclick="showHome()">Back to Home</button>
                </div>
            </main>

            <!-- Right: Chat Sidebar -->
            <aside id="chat-sidebar" class="sidebar sidebar-right">
                <div class="sidebar-content">
                    <div class="sidebar-header">
                        <h3>AI Assistant</h3>
                        <button class="clear-chat-btn" onclick="clearSidebarChat()" title="Clear chat history">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        </button>
                    </div>
                    <div id="chat-messages"></div>
                    <div class="chat-input-area">
                        <textarea id="chat-input" placeholder="Ask about this question..." rows="1"></textarea>
                        <button id="chat-send-btn" onclick="sendChatMessage()">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                        </button>
                    </div>
                </div>
            </aside>
        </div>

        <!-- Confirm Delete Modal -->
        <div id="confirm-modal" class="modal-overlay hidden">
            <div class="modal-card">
                <h3 id="confirm-title">Delete Set</h3>
                <p id="confirm-message">Are you sure you want to delete this set? This cannot be undone.</p>
                <div class="modal-actions">
                    <button class="modal-cancel-btn" onclick="closeConfirmModal()">Cancel</button>
                    <button class="modal-confirm-btn" id="confirm-ok-btn">Delete</button>
                </div>
            </div>
        </div>

        <!-- Append Questions Modal -->
        <div id="append-modal" class="modal-overlay hidden">
            <div class="modal-card modal-card-wide">
                <h3>Add Questions</h3>
                <form id="append-form" onsubmit="handleAppend(event)">
                    <div class="form-group">
                        <label for="append-prompt">Prompt / Description *</label>
                        <textarea id="append-prompt" rows="4" placeholder="e.g. Generate 10 questions about hypothesis testing..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="append-file">File (optional, PDF or DOCX)</label>
                        <input type="file" id="append-file" accept=".pdf,.docx" multiple>
                    </div>
                    <div class="form-group">
                        <label for="append-references">Reference file paths (optional)</label>
                        <textarea id="append-references" rows="2" placeholder="e.g. /path/to/Lecture 03.pdf"></textarea>
                    </div>
                    <div id="append-status" class="hidden"></div>
                    <div class="modal-actions">
                        <button type="button" class="modal-cancel-btn" onclick="closeAppendModal()">Cancel</button>
                        <button type="submit" class="modal-confirm-btn" id="append-submit-btn" style="background: var(--accent);">Add</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
